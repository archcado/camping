<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 露營生活誌 - 探索戶外的每一步，都是故事。新手教學、景點推薦、裝備評測一次看。">
  <meta name="theme-color" content="#FAF7ED">
  <title>部落格 - Yuruicamp 露營選物</title>
  <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme/theme-tokens.css">
  <link rel="stylesheet" href="../css/theme/theme-base.css">
  <link rel="stylesheet" href="../css/theme/theme-components.css">
  <link rel="stylesheet" href="../css/theme/theme-layout.css">
  <link rel="stylesheet" href="../css/theme/theme-header.css">
  <link rel="stylesheet" href="../css/theme/pages/blog.css">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/yuruicamp-favicon.svg">
</head>
<body class="yr-theme yr-blog-page">

  <div id="header" data-header-context="shop"></div>

  

  <!-- ===================================================
       主要內容
       =================================================== -->
  <main>

    <!-- -----------------------------------------------
         頁面 Banner：深綠漸層背景
         ----------------------------------------------- -->
    <section class="page-banner yr-blog-hero">
      <div class="container">
        <h1 class="page-banner-title yr-blog-hero__title"><i class="bi bi-journal-richtext" aria-hidden="true"></i> 露營生活誌</h1>
        <p class="page-banner-subtitle yr-blog-hero__description">探索戶外的每一步，都是故事</p>
      </div>
    </section>

    <!-- -----------------------------------------------
         主要內容容器
         ----------------------------------------------- -->
    <div class="container yr-blog-content">

      <!-- 精選文章（Featured Article）- 由 JS 動態渲染 -->
      <section id="featuredArticle" class="blog-featured yr-blog-featured">
        <!-- JS 會把精選文章渲染到這裡 -->
      </section>

      <section class="yr-blog-themes" aria-labelledby="blogThemesTitle">
        <header class="yr-blog-themes__header">
          <p class="yr-blog-themes__eyebrow">Yuruicamp Journal</p>
          <h2 id="blogThemesTitle" class="yr-blog-themes__title">從日常走進自然</h2>
          <p class="yr-blog-themes__description">在風景、旅程、器物與火光之間，閱讀屬於戶外生活的片刻。</p>
        </header>

        <div class="yr-blog-themes__rail" id="blogThemesRail" aria-label="Blog 主題分類入口">
          <button
            class="yr-blog-theme-card"
            type="button"
            data-blog-category="景點推薦"
            aria-controls="articlesGrid"
            aria-pressed="false"
            aria-label="篩選景點推薦文章：住 / STAY"
          >
            <img
              class="yr-blog-theme-card__image"
              src="../assets/images/blog/categories/blog-category-stay.webp"
              alt="晨霧森林中的亞麻色露營帳篷與木質家具"
              width="1122"
              height="1402"
              loading="lazy"
              decoding="async"
            >
            <span class="yr-blog-theme-card__overlay" aria-hidden="true"></span>
            <span class="yr-blog-theme-card__content">
              <span class="yr-blog-theme-card__label">
                <span class="yr-blog-theme-card__han">住</span>
                <span class="yr-blog-theme-card__en">/ STAY</span>
              </span>
              <span class="yr-blog-theme-card__copy">
                <span class="yr-blog-theme-card__copy-line">住進樹影與晨霧之間</span>
                <span class="yr-blog-theme-card__copy-line">讓日常拾起風景，</span>
                <span class="yr-blog-theme-card__copy-line">在風裡輕輕搖曳</span>
              </span>
            </span>
          </button>

          <button
            class="yr-blog-theme-card"
            type="button"
            data-blog-category="景點推薦"
            aria-controls="articlesGrid"
            aria-pressed="false"
            aria-label="篩選景點推薦文章：行 / JOURNEY"
          >
            <img
              class="yr-blog-theme-card__image"
              src="../assets/images/blog/categories/blog-category-journey.webp"
              alt="沿著台灣山海延伸的無人海岸步道"
              width="1122"
              height="1402"
              loading="lazy"
              decoding="async"
            >
            <span class="yr-blog-theme-card__overlay" aria-hidden="true"></span>
            <span class="yr-blog-theme-card__content">
              <span class="yr-blog-theme-card__label">
                <span class="yr-blog-theme-card__han">行</span>
                <span class="yr-blog-theme-card__en">/ JOURNEY</span>
              </span>
              <span class="yr-blog-theme-card__copy">
                <span class="yr-blog-theme-card__copy-line">由山海出發，</span>
                <span class="yr-blog-theme-card__copy-line">循著腳步走遠</span>
                <span class="yr-blog-theme-card__copy-line">海風吹動每一段旅程</span>
              </span>
            </span>
          </button>

          <button
            class="yr-blog-theme-card"
            type="button"
            data-blog-category="新手教學"
            aria-controls="articlesGrid"
            aria-pressed="false"
            aria-label="篩選新手教學文章：遊 / CAMP"
          >
            <img
              class="yr-blog-theme-card__image"
              src="../assets/images/blog/categories/blog-category-camp.webp"
              alt="山林草地上隨風展開的亞麻色露營天幕"
              width="1122"
              height="1402"
              loading="lazy"
              decoding="async"
            >
            <span class="yr-blog-theme-card__overlay" aria-hidden="true"></span>
            <span class="yr-blog-theme-card__content">
              <span class="yr-blog-theme-card__label">
                <span class="yr-blog-theme-card__han">遊</span>
                <span class="yr-blog-theme-card__en">/ CAMP</span>
              </span>
              <span class="yr-blog-theme-card__copy">
                <span class="yr-blog-theme-card__copy-line">在草木與天際線之間逗留</span>
                <span class="yr-blog-theme-card__copy-line">感受季節流動，</span>
                <span class="yr-blog-theme-card__copy-line">帷幕隨風輕晃</span>
              </span>
            </span>
          </button>

          <button
            class="yr-blog-theme-card"
            type="button"
            data-blog-category="裝備評測"
            aria-controls="articlesGrid"
            aria-pressed="false"
            aria-label="篩選裝備評測文章：裝 / GEAR"
          >
            <img
              class="yr-blog-theme-card__image"
              src="../assets/images/blog/categories/blog-category-gear.webp"
              alt="山林晨霧中的登山背包與露營器物"
              width="1122"
              height="1402"
              loading="lazy"
              decoding="async"
            >
            <span class="yr-blog-theme-card__overlay" aria-hidden="true"></span>
            <span class="yr-blog-theme-card__content">
              <span class="yr-blog-theme-card__label">
                <span class="yr-blog-theme-card__han">裝</span>
                <span class="yr-blog-theme-card__en">/ GEAR</span>
              </span>
              <span class="yr-blog-theme-card__copy">
                <span class="yr-blog-theme-card__copy-line">選擇陪你走進自然的器物</span>
                <span class="yr-blog-theme-card__copy-line">讓行囊在旅程裡，</span>
                <span class="yr-blog-theme-card__copy-line">找到家的位置</span>
              </span>
            </span>
          </button>

          <button
            class="yr-blog-theme-card"
            type="button"
            data-blog-category="生活技巧"
            aria-controls="articlesGrid"
            aria-pressed="false"
            aria-label="篩選生活技巧文章：食 / FOOD"
          >
            <img
              class="yr-blog-theme-card__image"
              src="../assets/images/blog/categories/blog-category-food.webp"
              alt="暮色山林中的戶外料理、火光與升起的炊煙"
              width="1122"
              height="1402"
              loading="lazy"
              decoding="async"
            >
            <span class="yr-blog-theme-card__overlay" aria-hidden="true"></span>
            <span class="yr-blog-theme-card__content">
              <span class="yr-blog-theme-card__label">
                <span class="yr-blog-theme-card__han">食</span>
                <span class="yr-blog-theme-card__en">/ FOOD</span>
              </span>
              <span class="yr-blog-theme-card__copy">
                <span class="yr-blog-theme-card__copy-line">圍著火光坐下</span>
                <span class="yr-blog-theme-card__copy-line">香氣圍著暮色繚繞，</span>
                <span class="yr-blog-theme-card__copy-line">炊煙緩緩升起</span>
              </span>
            </span>
          </button>
        </div>
      </section>

      <!-- 分類篩選 Tab -->
      <div class="category-tabs yr-blog-tabs" id="categoryTabs">
        <button class="filter-btn active" data-cat="all">全部</button>
        <button class="filter-btn" data-cat="新手教學">新手教學</button>
        <button class="filter-btn" data-cat="景點推薦">景點推薦</button>
        <button class="filter-btn" data-cat="生活技巧">生活技巧</button>
        <button class="filter-btn" data-cat="裝備評測">裝備評測</button>
      </div>

      <!-- 文章網格 - 由 JS 動態渲染 -->
      <div class="products-grid yr-blog-grid" id="articlesGrid">
        <!-- JS 會把文章卡片渲染到這裡 -->
      </div>

      <!-- 若沒有文章則顯示空狀態 -->
      <div id="noArticles" class="yr-blog-empty">
        <div><i class="bi bi-inbox" aria-hidden="true"></i></div>
        <p>目前沒有符合條件的文章</p>
      </div>

    </div>
  </main>

  <div id="footer"></div>
  <!-- ===================================================
       Script 載入順序（注意：有依賴關係）
       1. config.js   → 全局設定
       2. api-mock.js → 模擬 API（window.API）
       3. toast.js    → showToast 函數
       4. modal.js    → openModal 函數
       5. header.js   → 導航欄功能
       6. cart.js     → 購物車功能
       7. blog.js     → 部落格頁邏輯（本頁主要邏輯）
       8. main.js     → 應用初始化
       =================================================== -->
  <script src="../js/config.js" defer></script>
  <script src="../js/storage.js" defer></script>
  <script src="../js/state.js" defer></script>
  <script src="../js/formatters.js" defer></script>
  <script src="../js/validators.js" defer></script>
  <script src="../js/cart-service.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/pages/blog.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
